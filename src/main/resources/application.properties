spring.application.name=segundoProyecto

# Carga variables desde un archivo .env en la raiz del proyecto, si existe.
spring.config.import=optional:file:.env[.properties]

# Conexion a Supabase/PostgreSQL.
# Supabase exige SSL, por eso sslmode=require va en la URL JDBC.
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://aws-0-ca-central-1.pooler.supabase.com:5432/postgres?sslmode=require}
spring.datasource.username=${DATABASE_USERNAME:postgres.fdbyrydvbfoovrvebxae}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

server.port=${PORT:${SERVER_PORT:8080}}

# Patrones extra de CORS (opcional). GitHub Pages y localhost ya vienen incluidos en codigo.
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:}
